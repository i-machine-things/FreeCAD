name: Auto Rebase onto Upstream

on:
  schedule:
    - cron: "0 4 * * 1"  # Monday 4 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebase:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main-dev
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Fetch upstream main
        run: |
          git remote add upstream https://github.com/FreeCAD/FreeCAD.git
          git fetch upstream main --no-tags

      - name: Check if upstream touched our files
        id: upstream_check
        run: |
          MERGE_BASE=$(git merge-base HEAD upstream/main)
          TOUCHED=$(git diff --name-only "$MERGE_BASE" upstream/main -- \
            src/Mod/Draft/importDXF.py \
            "src/Mod/Draft/Resources/ui/preferences-dxf.ui")
          if [ -n "$TOUCHED" ]; then
            echo "touched=true" >> "$GITHUB_OUTPUT"
            echo "touched_files=$TOUCHED" >> "$GITHUB_OUTPUT"
          else
            echo "touched=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Attempt rebase
        id: rebase
        run: |
          if git rebase upstream/main; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
          else
            CONFLICT_FILES=$(git diff --name-only --diff-filter=U)
            git rebase --abort
            echo "status=conflict" >> "$GITHUB_OUTPUT"
            {
              echo "conflict_files<<EOF"
              echo "$CONFLICT_FILES"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Push rebased branch
        if: steps.rebase.outputs.status == 'clean'
        run: git push --force-with-lease origin main-dev

      - name: Summarise rebase conflict and fail
        if: steps.rebase.outputs.status == 'conflict'
        run: |
          {
            echo "## ⚠️ Auto-rebase conflict — manual fix required"
            echo ""
            echo "The weekly rebase of \`main-dev\` onto \`upstream/main\` was aborted."
            echo ""
            echo "### Conflicting files"
            echo '```'
            echo "${{ steps.rebase.outputs.conflict_files }}"
            echo '```'
            echo ""
            echo "### Fix locally"
            echo '```bash'
            echo "git fetch upstream"
            echo "git rebase upstream/main"
            echo "# resolve conflicts, then:"
            echo "git add <files>"
            echo "git rebase --continue"
            echo "git push --force-with-lease"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error::Rebase conflict on main-dev — see job summary for details."
          exit 1

      - name: Warn if upstream touched DXF files
        if: steps.rebase.outputs.status == 'clean' && steps.upstream_check.outputs.touched == 'true'
        run: |
          {
            echo "## ⚠️ Upstream modified DXF files — verify feature"
            echo ""
            echo "Rebase succeeded, but upstream changed files that overlap with the DXF export feature."
            echo "Check that the units dropdown still works correctly."
            echo ""
            echo "### Modified upstream files"
            echo '```'
            echo "${{ steps.upstream_check.outputs.touched_files }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::warning::Upstream touched DXF files — verify the export units feature still works."
