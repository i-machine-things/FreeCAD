name: Auto Rebase onto Upstream

on:
  schedule:
    - cron: "0 4 * * 1"  # Monday 4 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  rebase:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main-dev
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Fetch upstream main
        run: |
          git remote add upstream https://github.com/FreeCAD/FreeCAD.git
          git fetch upstream main --no-tags

      - name: Check if upstream touched our files
        id: upstream_check
        run: |
          MERGE_BASE=$(git merge-base HEAD upstream/main)
          TOUCHED=$(git diff --name-only "$MERGE_BASE" upstream/main -- \
            src/Mod/Draft/importDXF.py \
            "src/Mod/Draft/Resources/ui/preferences-dxf.ui")
          if [ -n "$TOUCHED" ]; then
            echo "touched=true" >> "$GITHUB_OUTPUT"
            echo "touched_files=$TOUCHED" >> "$GITHUB_OUTPUT"
          else
            echo "touched=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Attempt rebase
        id: rebase
        run: |
          if git rebase upstream/main; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
          else
            CONFLICT_FILES=$(git diff --name-only --diff-filter=U)
            git rebase --abort
            echo "status=conflict" >> "$GITHUB_OUTPUT"
            {
              echo "conflict_files<<EOF"
              echo "$CONFLICT_FILES"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Push rebased branch
        if: steps.rebase.outputs.status == 'clean'
        run: git push --force-with-lease origin main-dev

      - name: Open issue — rebase conflict
        if: steps.rebase.outputs.status == 'conflict'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh issue list \
            --search "Auto-rebase conflict in:title" \
            --state open --json number --jq '.[0].number' 2>/dev/null)
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already open — skipping."
            exit 0
          fi
          printf '## Rebase failed\n\nThe weekly auto-rebase of `main-dev` onto `upstream/main` hit conflicts and was aborted.\n\n**Conflicting files:**\n```\n%s\n```\n\n**Fix locally:**\n```bash\ngit fetch upstream\ngit rebase upstream/main\n# resolve conflicts, then:\ngit add <files>\ngit rebase --continue\ngit push --force-with-lease\n```\n\n[Workflow run](%s)\n' \
            "${{ steps.rebase.outputs.conflict_files }}" \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            > /tmp/conflict_body.md
          gh issue create \
            --title "Auto-rebase conflict: main-dev needs manual rebase" \
            --label "bug" \
            --body-file /tmp/conflict_body.md

      - name: Open issue — upstream touched DXF files (clean rebase, verify feature)
        if: steps.rebase.outputs.status == 'clean' && steps.upstream_check.outputs.touched == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh issue list \
            --search "Upstream changed DXF files in:title" \
            --state open --json number --jq '.[0].number' 2>/dev/null)
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already open — skipping."
            exit 0
          fi
          printf '## Heads up\n\nThe auto-rebase onto `upstream/main` succeeded, but upstream modified files that overlap with the DXF export scale feature. The branch has been updated automatically — please verify the feature still behaves correctly.\n\n**Upstream-modified files:**\n```\n%s\n```\n\n[Workflow run](%s)\n' \
            "${{ steps.upstream_check.outputs.touched_files }}" \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            > /tmp/touched_body.md
          gh issue create \
            --title "Upstream changed DXF files — verify scale feature still works" \
            --label "enhancement" \
            --body-file /tmp/touched_body.md
