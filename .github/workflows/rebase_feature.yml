name: Rebase feature branch onto main

on:
  schedule:
    - cron: '30 3 * * *'   # 03:30 UTC nightly (after sync_upstream at 03:00)
  workflow_dispatch:

jobs:
  rebase:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FEATURE_BRANCH: feat/dxf-export-units
      WATCHED_FILES: |
        src/Mod/Draft/importDXF.py
        src/Mod/Draft/Resources/ui/preferences-dxf.ui
        src/Mod/Import/App/dxf/ImpExpDxf.cpp
        src/Mod/Import/App/dxf/dxf.cpp
        src/Mod/Import/App/dxf/dxf.h

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.FEATURE_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch main
        run: git fetch origin main

      - name: Check if main has new commits touching watched files
        id: conflict_check
        run: |
          TOUCHED=$(git log --oneline "${{ env.FEATURE_BRANCH }}..origin/main" -- \
            src/Mod/Draft/importDXF.py \
            src/Mod/Draft/Resources/ui/preferences-dxf.ui \
            src/Mod/Import/App/dxf/ImpExpDxf.cpp \
            src/Mod/Import/App/dxf/dxf.cpp \
            src/Mod/Import/App/dxf/dxf.h)
          if [ -n "$TOUCHED" ]; then
            echo "touched=true" >> "$GITHUB_OUTPUT"
            echo "$TOUCHED" > /tmp/touched_commits.txt
          else
            echo "touched=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Abort and summarise if watched files were touched upstream
        if: steps.conflict_check.outputs.touched == 'true'
        run: |
          COMMITS=$(cat /tmp/touched_commits.txt)
          {
            echo "## ⚠️ Manual rebase required"
            echo ""
            echo "Upstream committed changes to watched DXF files."
            echo "The nightly rebase of \`${{ env.FEATURE_BRANCH }}\` was **aborted**."
            echo ""
            echo "### Commits that touched watched files"
            echo '```'
            echo "${COMMITS}"
            echo '```'
            echo ""
            echo "### Watched files"
            echo '```'
            echo "src/Mod/Draft/importDXF.py"
            echo "src/Mod/Draft/Resources/ui/preferences-dxf.ui"
            echo "src/Mod/Import/App/dxf/ImpExpDxf.cpp"
            echo "src/Mod/Import/App/dxf/dxf.cpp"
            echo "src/Mod/Import/App/dxf/dxf.h"
            echo '```'
            echo ""
            echo "### Fix"
            echo '```bash'
            echo "git fetch origin main"
            echo "git rebase origin/main"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error::Upstream touched DXF files — manual rebase required. See job summary for details."
          exit 1

      - name: Rebase onto main
        run: |
          git rebase origin/main || {
            git rebase --abort
            echo "Rebase failed with unexpected conflicts."
            exit 1
          }

      - name: Push rebased branch
        run: git push origin "${{ env.FEATURE_BRANCH }}" --force-with-lease
